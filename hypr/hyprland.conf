# vim:ft=hyprlang:fileencoding=utf-8:foldmethod=marker

#: Introduction {{{

#: This is an example Hyprland config file.
#: Refer to the wiki for more information.
#: https://wiki.hyprland.org/Configuring/Configuring-Hyprland/

#: Please note not all available settings / options are set here.
#: For a full list, see the wiki

#: You can split this configuration into multiple files
#: Create your files separately and then link them to this file like this:
#: source = ~/.config/hypr/myColors.conf

#: }}}

#: Monitors {{{

#: See https://wiki.hyprland.org/Configuring/Monitors/
monitor=,preferred,auto,1
#monitor=HDMI-A-1,2560x1440@59.95Hz,0x0,1
#monitor=eDP-1,preferred,0x1440,1
#monitor=FALLBACK,1920x1080@60,auto,1

#: Ref: https://bobbys.zone/guides/hyprland-clamshell
#: Lid is opened
bindl=,switch:off:Lid Switch,exec,~/.config/hypr/lid.sh
#: Lid is closed
bindl=,switch:on:Lid Switch,exec,~/.config/hypr/lid.sh

#: }}}

#: My programs {{{

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = nautilus
$browser = zen-browser
$menu = rofi -show drun

#: }}}

#: Autostart {{{

#: Autostart necessary processes (like notifications daemons, status bars, etc.)
#: Or execute your favorite apps at launch like this:

#exec = $HOME/.config/hypr/lid.sh
exec-once = ~/.config/hypr/scripts/xdg.sh
exec-once = swaync
exec-once = hypridle
exec-once = wl-paste --watch cliphist store
#: Workspaces
exec-once = [workspace 1 silent] $terminal
exec-once = [workspace 2 silent] $browser
exec-once = [workspace 5 silent] bitwarden-desktop

#: }}}

#: Environment Variables {{{

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

#: }}}

#: Look and feel {{{

#: Refer to https://wiki.hyprland.org/Configuring/Variables/

#: https://wiki.hyprland.org/Configuring/Variables/#general
general { 
    gaps_in = 4
    gaps_out = 7
    border_size = 3

    #: https://wiki.hyprland.org/Configuring/Variables/#variable-types for info
    #: about colors
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    #: Set to true enable resizing windows by clicking and dragging on borders
    #: and gaps
    resize_on_border = false 

    #: Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn
    #: this on
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 4 # 0
    active_opacity = 1.0
    inactive_opacity = 0.8
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6 #3
        passes = 2 #1
        new_optimizations = on
        vibrancy = 0.1696
        ignore_opacity = true
        xray = true
        # blurls = waybar
    }

    shadow {
        enabled = true
        range = 30 # 4
        render_power = 3
        color = 0x66000000 # rgba(1a1a1aee)
    }
}

#: https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = false

    #: Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

#: See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    #: Master switch for pseudotiling. Enabling is bound to mainMod + P in the
    #: keybinds section below
    pseudotile = true
    #: You probably want this
    preserve_split = true
}

#: See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

#: https://wiki.hyprland.org/Configuring/Variables/#misc
misc { 
    #: Set to 0 or 1 to disable the anime mascot wallpapers
    force_default_wallpaper = -1
    #: If true disables the random hyprland logo / anime girl background. :(
    disable_hyprland_logo = false
}

#: }}}

#: Input {{{

#: https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options = ctrl:nocaps
    kb_rules =

    follow_mouse = 1
    #: -1.0 - 1.0, 0 means no modification.
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

#: https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    workspace_swipe = false
}

#: See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs
#: for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

#: }}}

#: Keybindings {{{

#: See https://wiki.hyprland.org/Configuring/Keywords/

#: Sets "Windows" key as main modifier
$mainMod = SUPER
$SCRIPTS = ~/.config/hypr/scripts

bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, SPACE, exec, $menu

bind = $mainMod, Q, killactive
bind = $mainMod, M, exit
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo
bind = $SUPER_SHIFT, l, exec, hyprlock
bind = $mainMod CTRL, R, exec, hyprctl reload
#: Take a screenshot
bind = $mainMod CTRL, S, exec, grim -g "$(slurp)" - | swappy -f -

#bind = $mainMod, J, togglesplit
#bind = $mainMod, K, swapsplit
bind = $mainMod, G, togglegroup

#: Move focus with mainMod + arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

#: Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

#: Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

#: Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

#: Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

#: Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
#: Increase window width with keyboard
bind = $mainMod SHIFT, right, resizeactive, 100 0
#: Reduce window width with keyboard
bind = $mainMod SHIFT, left, resizeactive, -100 0
#: Increase window height with keyboard
bind = $mainMod SHIFT, down, resizeactive, 0 100
#: Reduce window height with keyboard
bind = $mainMod SHIFT, up, resizeactive, 0 -100

#: Function keys
#: Increase brightness by 10%
bind = , XF86MonBrightnessUp, exec, brightnessctl -q s +10%
#: Reduce brightness by 10%
bind = , XF86MonBrightnessDown, exec, brightnessctl -q s 10%-
#: Increase volume by 5%
bind = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
#: Reduce volume by 5%
bind = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
#: Toggle mute
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
#: Audio play pause
bind = , XF86AudioPlay, exec, playerctl play-pause
#: Audio pause
bind = , XF86AudioPause, exec, playerctl pause
#: Audio next
bind = , XF86AudioNext, exec, playerctl next
#: Audio previous
bind = , XF86AudioPrev, exec, playerctl previous
#: Toggle microphone
bind = , XF86AudioMicMute, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
#: Open calculator
bind = , XF86Calculator, exec, ~/.config/ml4w/settings/calculator.sh
#: Open screenlock
bind = , XF86Lock, exec, hyprlock
#: Open ML4W Dotfiles Settings app
bind = , XF86Tools, exec, $(cat ~/.config/ml4w/settings/terminal.sh) --class dotfiles-floating -e ~/.config/ml4w/apps/ML4W_Dotfiles_Settings-x86_64.AppImage
bind = , code:238, exec, brightnessctl -d smc::kbd_backlight s +10
bind = , code:237, exec, brightnessctl -d smc::kbd_backlight s 10-

#: }}}

#: Windows and workspaces {{{

#: See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
#: See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

#: Example windowrule v1
# windowrule = float, ^(kitty)$

#: Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$

#windowrulev2 = stayfocused, title:^(Zoom Workplace)$, class:^(zoom)$
windowrulev2 = suppressevent maximize, class:.*

#: }}}
