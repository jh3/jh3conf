background {
    monitor =
    color = rgba(25, 20, 20, 1.0)

    blur_passes = 0
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    placeholder_text = 
    hide_input = true
    size = 4%, 10%
    outline_thickness = 2
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg
    fail_text = nope
    fail_timeout = 1000

    font_color = rgb(143, 143, 143)
    font_size = 24
    fade_on_empty = false
    rounding = -1

    position = 0, -20
    halign = center
    valign = center
}
